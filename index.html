<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>The Fern Guest Information</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<div class="overlay">

<div class="card">

<!-- Logo -->

<div class="logo-section">

<img src="assets/logo.png"
class="fern-logo"
alt="The Fern">

<img src="assets/marriott.png"
class="marriott-logo"
alt="Series by Marriott">

</div>

<!-- Hotel Image -->

<div class="hotel-image">

<img src="assets/hotel.png"
alt="Hotel">

</div>

<!-- Heading -->

<h1>Guest Information</h1>

<p>
Welcome to The Fern.<br>
Please select one of the options below.
</p>

<!-- Buttons -->

<div class="button-group">

<a href="room-directory.pdf" target="_blank" class="btn">

<div class="icon">
<i class="fa-solid fa-book-open"></i>
</div>

<div class="text">
<h3>Room Directory</h3>
<span>Hotel Services & Information</span>
</div>

<i class="fa-solid fa-angle-right arrow"></i>

</a>

<a href="restaurant-menu.pdf" target="_blank" class="btn">

<div class="icon">
<i class="fa-solid fa-utensils"></i>
</div>

<div class="text">
<h3>Restaurant Menu</h3>
<span>Food & Beverage Menu</span>
</div>

<i class="fa-solid fa-angle-right arrow"></i>

</a>

</div>

<!-- Footer -->

<div class="footer">

© 2026 The Fern Hotels & Resorts

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
